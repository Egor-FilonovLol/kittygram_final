volumes:
  pg_data_production:
  static_volume: 
  media_volume:
services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: s418963/kittygram_backend:latest
    depends_on: 
     - db
    env_file: .env
    volumes:
      - static_volume:/app/collected_static
      - media_volume:/app/media
  frontend:  # ДОБАВИТЬ ЭТОТ СЕРВИС
    image: s418963/kittygram_frontend:latest
    volumes:
      - static_volume:/app/static
    command: cp -r /app/build/. /app/static/
  gateway:
    image: s418963/kittygram_gateway:latest
    env_file: .env
    depends_on:
      - backend
      - frontend 
    ports:
      - "80:80"
    volumes:
     - static_volume:/app/static
     - media_volume:/app/media