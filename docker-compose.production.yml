version: '3'

volumes:
  pg_data_production:
  media_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: s418963/kittygram_backend:latest
    depends_on: 
      - db
    env_file: .env
    volumes:
      - ./static:/app/collected_static  # ИЗМЕНИЛОСЬ
      - media_volume:/app/media
    
  frontend:  
    image: s418963/kittygram_frontend:latest
    volumes:
      - ./static:/app/static  # ИЗМЕНИЛОСЬ
    command: cp -r /app/build/. /app/static/
    
  gateway:
    image: s418963/kittygram_gateway:latest
    env_file: .env
    depends_on:
      - backend
      - frontend 
    ports:
      - "9000:80"
    volumes:
      - ./static:/app/static  # ИЗМЕНИЛОСЬ
      - media_volume:/app/media