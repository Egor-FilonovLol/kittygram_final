version: '3'

volumes:
  pg_data:
  static:
  media:
services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: ./backend/
    env_file: .env
    volumes:
    - static:/app/collected_static
    - media:/app/media
    depends_on:
    - db
  frontend:
    build: ./frontend/
    command: cp -r /app/build/. /app/static/
    volumes:
      - static:/app/static
  gateway:
    build: ./nginx/
    ports:
      - 9000:80
    volumes:
      - static:/app/static
      - media:/app/media
    depends_on:
      - backend
      - frontend 